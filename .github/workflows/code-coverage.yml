name: code-coverage

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: code-coverage::${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-coverage:
    name: Rust Cobertura coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      code-quality: write
      pull-requests: read
    steps:
      - name: Checkout repository
        # actions/checkout v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache cargo artifacts
        # swatinem/rust-cache v2
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: code-coverage-${{ runner.os }}-workspace
          workspaces: |
            . -> target
          cache-on-failure: "true"
          cache-all-crates: "true"
          cache-workspace-crates: "true"

      - name: Install coverage tool
        # taiki-e/install-action v2
        uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage
        run: |
          mkdir -p coverage
          cargo llvm-cov --all-targets --all-features \
            --cobertura --output-path coverage/google-ad-manager-mcp.xml

      - name: Upload coverage to GitHub Code Quality
        # actions/upload-code-coverage v1
        uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3
        with:
          file: coverage/google-ad-manager-mcp.xml
          language: Rust
          label: code-coverage/google-ad-manager-mcp
          fail-on-error: false

      - name: Upload Cobertura report
        # actions/upload-artifact v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: rust-cobertura-coverage-google-ad-manager-mcp
          path: coverage/google-ad-manager-mcp.xml
          if-no-files-found: error

      - name: Summarize coverage report
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          from pathlib import Path
          from xml.etree import ElementTree

          report = Path("coverage/google-ad-manager-mcp.xml")
          root = ElementTree.parse(report).getroot()
          line_rate = float(root.attrib.get("line-rate", "0"))
          print("### Rust coverage")
          print()
          print("- Target: `google-ad-manager-mcp`")
          print(f"- Report: `{report}`")
          print(f"- Line coverage: {line_rate * 100:.2f}%")
          print("- GitHub Code Quality upload: attempted; non-blocking until the repository setting is enabled.")
          PY

name: cargo-package-readiness

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cargo-package-readiness::${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cargo-package-readiness:
    name: First-wave Cargo package readiness
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        # actions/checkout v6
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve target metadata
        shell: bash
        run: |
          set -euo pipefail

          target_sha="$(git rev-parse HEAD)"
          {
            echo "### Cargo package readiness"
            echo
            echo "- Validation posture: \`first-wave package readiness\`"
            echo "- Target ref: \`${GITHUB_REF_NAME}\`"
            echo "- Target SHA: \`${target_sha}\`"
            echo "- Publication posture: \`public binary with install smoke\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache cargo artifacts
        # swatinem/rust-cache v2
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: cargo-package-readiness-${{ runner.os }}
          workspaces: |
            . -> target
          cache-on-failure: "true"
          cache-all-crates: "true"
          cache-workspace-crates: "true"

      - name: Verify packaging and installability
        shell: bash
        run: |
          set -euo pipefail
          cargo package --list
          cargo install --locked --path . --root .tmp/install-root
          .tmp/install-root/bin/google-ad-manager-mcp --version
          .tmp/install-root/bin/google-ad-manager-mcp --print-tools >/dev/null

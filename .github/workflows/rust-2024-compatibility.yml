name: rust-2024-compatibility

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "tests/**"
      - "rust-toolchain*"
      - ".github/workflows/rust-2024-compatibility.yml"
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "tests/**"
      - "rust-toolchain*"
      - ".github/workflows/rust-2024-compatibility.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-2024-compatibility::${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-2024-compatibility:
    name: Rust 2024 compatibility
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        # actions/checkout v6
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache cargo artifacts
        # swatinem/rust-cache v2
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: rust-2024-compatibility-${{ runner.os }}-workspace
          workspaces: |
            . -> target
          cache-on-failure: "true"
          cache-all-crates: "true"
          cache-workspace-crates: "true"

      - name: Check Rust 2024 compatibility
        env:
          RUSTFLAGS: "-Wrust-2024-compatibility -Dwarnings"
        run: cargo check --all-targets --all-features

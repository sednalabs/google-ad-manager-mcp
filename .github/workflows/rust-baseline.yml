name: rust-baseline

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: rust-baseline::${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-baseline-lane:
    name: Rust baseline / ${{ matrix.lane.phase_name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        lane:
          - phase_name: fmt
            command: cargo fmt --all --check
          - phase_name: clippy
            command: cargo clippy --all-targets --all-features -- -D warnings
          - phase_name: targeted-tests
            command: |
              cargo test --lib --all-features
              cargo test --test stdio_smoke --all-features
              cargo test --test tool_schema_snapshot --all-features
    steps:
      - name: Checkout
        # actions/checkout v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: clippy, rustfmt

      - name: Cache cargo artifacts
        # swatinem/rust-cache v2
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: rust-baseline-${{ runner.os }}-workspace
          workspaces: |
            . -> target
          cache-on-failure: "true"
          cache-all-crates: "true"
          cache-workspace-crates: "true"

      - name: Run baseline lane
        run: ${{ matrix.lane.command }}

      - name: Generate rustfmt patch
        if: ${{ always() && matrix.lane.phase_name == 'fmt' }}
        run: |
          cargo fmt --all
          git diff --binary > rustfmt.patch

      - name: Upload rustfmt patch
        if: ${{ always() && matrix.lane.phase_name == 'fmt' }}
        # actions/upload-artifact v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: rustfmt-patch
          path: rustfmt.patch
          if-no-files-found: error

      - name: Generate tool schema candidate
        if: ${{ always() && matrix.lane.phase_name == 'targeted-tests' }}
        run: cargo run --quiet -- --print-tool-schema > tool_schema_snapshot.v1.json

      - name: Upload tool schema candidate
        if: ${{ always() && matrix.lane.phase_name == 'targeted-tests' }}
        # actions/upload-artifact v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: tool-schema-candidate
          path: tool_schema_snapshot.v1.json
          if-no-files-found: error

  rust-baseline:
    name: Run targeted Rust baseline
    runs-on: ubuntu-24.04
    needs: [rust-baseline-lane]
    if: ${{ always() }}
    steps:
      - name: Require every baseline lane to pass
        shell: bash
        run: |
          if [[ "${{ needs.rust-baseline-lane.result }}" != "success" ]]; then
            echo "One or more Rust baseline lanes failed." >&2
            exit 1
          fi
          echo "All Rust baseline lanes passed."
